version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: spo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: spo_user
      POSTGRES_PASSWORD: spo_password
      POSTGRES_DB: spo_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U spo_user -d spo_db']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
